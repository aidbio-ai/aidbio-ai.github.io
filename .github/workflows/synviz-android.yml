name: Build SynViz Android APK

# Builds the Android app that lives in the synviz-android/ subdirectory of this
# repository. This is what compiles the APK on GitHub's runners (which ship the
# Android SDK), since the source sandbox cannot reach Google's SDK servers.
on:
  push:
    branches:
      - 'claude/android-app-new-repo-uqeqcw'
    paths:
      - 'synviz-android/**'
      - '.github/workflows/synviz-android.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: synviz-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Stage APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/synviz-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: synviz-debug-apk
          path: synviz-android/out/synviz-debug.apk
          if-no-files-found: error
